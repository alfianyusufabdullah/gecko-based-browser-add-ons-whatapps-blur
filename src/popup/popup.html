<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA Blur</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111b21;
      color: #e9edef;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #00a884;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #e9edef;
    }

    .header-sub {
      font-size: 11px;
      color: #8696a0;
      margin-top: 1px;
    }

    .section {
      background: #202c33;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-text {
      font-size: 13px;
      color: #e9edef;
    }

    .toggle-sublabel {
      font-size: 11px;
      color: #8696a0;
      margin-top: 2px;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #374045;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      top: 3px;
      background: #aebac1;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    input:checked + .slider {
      background: #00a884;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    /* Blur level */
    .level-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .level-label {
      font-size: 13px;
      color: #e9edef;
    }

    .level-value {
      font-size: 12px;
      font-weight: 600;
      color: #00a884;
      background: #0a1f1a;
      padding: 2px 8px;
      border-radius: 6px;
      min-width: 32px;
      text-align: center;
    }

    /* Range slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #374045;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00a884;
      cursor: pointer;
      border: none;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00a884;
      cursor: pointer;
      border: none;
    }

    .level-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 9px;
      color: #54656f;
      padding: 0 2px;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 10px;
      color: #3b4a54;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🫣</div>
    <div>
      <div class="header-title">WA Blur</div>
      <div class="header-sub">web.whatsapp.com</div>
    </div>
  </div>

  <div class="section">
    <div class="toggle-row">
      <div>
        <div class="toggle-text">Blur Pesan</div>
        <div class="toggle-sublabel">Hover untuk lihat</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleBlur" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="level-header">
      <span class="level-label">Tingkat Blur</span>
      <span class="level-value" id="levelValue">6</span>
    </div>
    <input type="range" id="blurLevel" min="0" max="20" value="6" step="1">
    <div class="level-ticks">
      <span>0</span><span>5</span><span>10</span><span>15</span><span>20</span>
    </div>
  </div>

  <div class="footer">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
